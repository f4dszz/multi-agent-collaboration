<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex - Multi-Agent Orchestrator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Left: Room List -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Rooms</h2>
        <button id="btn-new-room" title="Create Room">+</button>
      </div>
      <div id="room-list"></div>
    </aside>

    <!-- Center: Chat Stream -->
    <main id="chat-panel">
      <div id="chat-header">
        <span id="room-title">Select a room</span>
        <span id="room-state" class="badge"></span>
      </div>
      <div id="game-container"></div>
      <div id="chat-messages"></div>
      <div id="chat-actions">
        <div id="action-buttons">
          <button id="btn-onboard" class="action-btn" onclick="doNext('onboard')">Onboard</button>
          <button id="btn-next" class="action-btn primary" onclick="doNext('auto')">Next Round</button>
          <button id="btn-auto" class="action-btn auto" onclick="toggleAuto()">Full-Auto</button>
          <button id="btn-approve" class="action-btn approve" onclick="doApprove('approve')">Approve</button>
          <button id="btn-reject" class="action-btn reject" onclick="doApprove('reject')">Reject</button>
          <button id="btn-interrupt" class="action-btn interrupt" onclick="doInterrupt()">⚡ Interrupt</button>
        </div>
        <div id="busy-indicator" style="display:none;font-size:12px;color:var(--accent);margin-bottom:8px"></div>
        <div id="task-bar" style="display:none">
          <input id="task-input" placeholder="Describe the task for executor..." />
          <button onclick="submitTask()">Assign Task</button>
        </div>
        <div id="intervene-bar">
          <input id="intervene-input" placeholder="Direct message to agent..." />
          <select id="intervene-target">
            <option value="executor">Executor</option>
            <option value="reviewer">Reviewer</option>
          </select>
          <button onclick="doIntervene()">Send</button>
        </div>
      </div>
    </main>

    <!-- Right: Mailbox Viewer -->
    <aside id="mailbox-panel">
      <h3>Mailbox Files</h3>
      <div id="mailbox-files"></div>
    </aside>
  </div>

  <!-- Create Room Dialog -->
  <dialog id="create-dialog">
    <h3>Create Room</h3>
    <form id="create-form">
      <label>Room ID<input name="room_id" required placeholder="my-project-v1"></label>
      <label>Workspace<input name="workspace" required placeholder="D:/workSpace/my-project"></label>
      <label>Task (optional)<textarea name="task" rows="2" placeholder="Initial task description"></textarea></label>
      <label>Executor Role<input name="executor_role" value="执行人"></label>
      <label>Reviewer Role<input name="reviewer_role" value="监督人"></label>
      <label>Executor Provider
        <select name="executor_provider"><option value="claude">Claude</option><option value="codex">Codex</option></select>
      </label>
      <label>Reviewer Provider
        <select name="reviewer_provider"><option value="claude">Claude</option><option value="codex">Codex</option></select>
      </label>
      <div class="dialog-actions">
        <button type="button" onclick="this.closest('dialog').close()">Cancel</button>
        <button type="submit" class="primary">Create</button>
      </div>
    </form>
  </dialog>

  <script src="game.js"></script>
  <script src="app.js"></script>
</body>
</html>
